<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Easy Recognize 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main>
    <h1>设置</h1>

    <fieldset>
      <legend>书签名称</legend>
      <label>
        <input type="radio" name="enabled" value="true">
        是
      </label>
      <label>
        <input type="radio" name="enabled" value="false">
        否
      </label>
    </fieldset>

    <fieldset id="length-section">
      <legend>显示前几个字符</legend>
      <label>
        <input type="radio" name="lengthMode" value="all">
        全部
      </label>
      <label>
        <input type="radio" name="lengthMode" value="first3">
        前 3 个字符
      </label>
      <label>
        <input type="radio" name="lengthMode" value="first5">
        前 5 个字符
      </label>
      <label class="custom-row">
        <input type="radio" name="lengthMode" value="custom">
        其他
        <input type="number" id="customLength" min="1" max="100" value="10">
        个字符
      </label>
    </fieldset>

    <p class="hint">双击扩展图标可快速切换「展示书签名称」开关</p>

    <fieldset id="tab-switcher-section">
      <legend>标签页搜索</legend>
      <label>
        <input type="radio" name="tabSwitcherEnabled" value="true">
        启用
      </label>
      <label>
        <input type="radio" name="tabSwitcherEnabled" value="false">
        禁用
      </label>

      <div class="shortcut-row">
        <span class="shortcut-label">已打开标签页</span>
        <code id="shortcutDisplay">Cmd+Shift+G</code>
        <button type="button" id="recordShortcut" class="secondary-button">录制</button>
        <button type="button" id="resetShortcut" class="secondary-button">重置</button>
        <button type="button" id="testTabSwitcher" class="secondary-button">测试</button>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-label">历史记录搜索</span>
        <code id="historyShortcutDisplay">Cmd+Shift+H</code>
        <button type="button" id="recordHistoryShortcut" class="secondary-button">录制</button>
        <button type="button" id="resetHistoryShortcut" class="secondary-button">重置</button>
        <button type="button" id="testHistorySwitcher" class="secondary-button">测试</button>
      </div>
      <p id="shortcutHint" class="field-hint">默认 Cmd+Shift+G / Cmd+Shift+H。保存后请刷新已打开的网页；若仍无效请到 chrome://extensions/shortcuts 手动分配</p>
    </fieldset>
  </main>
  <script src="../src/shortcut.js"></script>
  <script src="settings.js"></script>
</body>
</html>
